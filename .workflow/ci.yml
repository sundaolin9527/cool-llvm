version: "1.0"
name: cool-llvm-ci
displayName: COOL LLVM CI

triggers:
  push:
    branches:
      include:
        - main
        - master
        - dev
  pullRequest:
    branches:
      include:
        - main
        - master
        - dev

stages:
  - stage:
      name: build_and_test
      displayName: Build And Test
      steps:
        - step: shell@agent
          name: ubuntu2004_llvm1606
          displayName: Ubuntu 20.04 / LLVM 16.0.6
          # Replace this placeholder with the real Gitee Go host group ID.
          hostGroupID: ubuntu2004-llvm1606
          script: bash scripts/ci/gitee_ci.sh
